<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Deep Blue Gradient (D) -->
    <linearGradient id="gradD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a75b3"/>
      <stop offset="100%" stop-color="#143b5c"/>
    </linearGradient>
    
    <!-- Bright Cyan Gradient (M overlapping) -->
    <linearGradient id="gradM" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#9ce6ff"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0e1f33" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Base Rectangle (Rounded) -->
  <rect x="10" y="10" width="100" height="100" rx="28" fill="#ffffff" opacity="0.0" />

  <!-- D shape -->
  <path d="M 30 25 L 55 25 C 80 25 95 40 95 60 C 95 80 80 95 55 95 L 30 95 Z M 48 42 L 48 78 C 65 78 75 70 75 60 C 75 50 65 42 48 42 Z" fill="url(#gradD)" filter="url(#shadow)"/>

  <!-- Data / M zigzag overlay -->
  <path d="M 22 75 L 45 42 L 62 60 L 88 22 L 95 35 L 62 82 L 45 61 L 30 85 Z" fill="url(#gradM)" filter="url(#shadow)"/>
</svg>
